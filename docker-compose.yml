version: "3.8"
services:
  backend:
    build:
      context: ./server
    image: akshatzzz/redbridge-backend:latest
    container_name: redbridge-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/redbridge
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./client
    image: akshatzzz/redbridge-frontend:latest
    container_name: redbridge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: